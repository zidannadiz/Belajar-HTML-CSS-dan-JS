<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table
      border="1px solid black"
      style="text-align: center"
      cellpadding="10"
      cellspacing="0"
    >
      <colgroup>
        <col span="4" style="background-color: lightgray" />
        <col style="background-color: lightblue" />
      </colgroup>
      <thead>
        <tr>
          <th colspan="2">Nama</th>
          <th>Alamat</th>
          <th>Umur</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>John</td>
          <td>Doe</td>
          <td>123 Main St</td>
          <td>30</td>
          <td>Single</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td rowspan="5" style="text-align: center">Alamat Lengkap</td>
          <td colspan="4">Desa Langut Kec. Lohbener Kab. Indramayu</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
